<div class="login-container">
    <div class="login-card glass-card">
        <h2 class="login-title">Student Login</h2>
        <p class="login-subtitle">Sign in to manage your course registrations and details.</p>

        @if (errorMessage) {
        <div class="error-alert">
            <span class="error-icon">⚠</span>
            <span class="error-text">{{ errorMessage }}</span>
        </div>
        }

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <div class="form-group">
                <label class="form-label" for="email">College Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="e.g. temp"
                    [(ngModel)]="email" required #emailInput="ngModel" [disabled]="isLoading">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password"
                    [(ngModel)]="password" required #passwordInput="ngModel" [disabled]="isLoading">
            </div>

            <button type="submit" class="btn-primary btn-login-submit" [disabled]="isLoading || !loginForm.form.valid">
                @if (isLoading) {
                <div class="btn-spinner"></div>
                <span>Signing in...</span>
                } @else {
                <span>Sign In</span>
                }
            </button>
        </form>

        <div class="demo-credentials-panel">
            <h4>🔑 Demo Credentials</h4>
            <div class="demo-cands">
                <p><strong>Email:</strong> <code>temp</code></p>
                <p><strong>Password:</strong> <code>temp</code></p>
            </div>
        </div>
    </div>
</div>
