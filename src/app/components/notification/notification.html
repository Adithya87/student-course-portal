<div class="notification-widget glass-card">
  <div class="widget-header">
    <span class="widget-badge badge-scoped">Scoped DI (Instance #{{ instanceId }})</span>
    <h3>Scoped Notifications</h3>
  </div>

  <div class="notification-list">
    @for (note of notifications; track $index) {
      <div class="note-item">
        <span class="bullet">•</span>
        <p class="note-text">{{ note }}</p>
      </div>
    } @empty {
      <p class="no-notes">No active notifications for this widget instance.</p>
    }
  </div>

  <div class="note-input-group">
    <input 
      type="text" 
      class="form-control" 
      placeholder="Type a notification message..." 
      [(ngModel)]="newMsg"
      (keyup.enter)="sendNotification()"
    >
    <button class="btn-primary btn-sm" (click)="sendNotification()">
      Broadcast
    </button>
  </div>
</div>
